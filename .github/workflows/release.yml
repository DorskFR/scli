name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to release"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: scli-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: scli-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-14
            name: scli-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            name: scli-darwin-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2.2.1
      - if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - if: runner.os == 'Linux'
        run: cargo zigbuild --release --target ${{ matrix.target }}
      - if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}
      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/scli dist/${{ matrix.name }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - run: cd dist && sha256sum scli-* > SHA256SUMS
      - run: |
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            dist/scli-*
            dist/SHA256SUMS
      # Rolling `latest` release: a moving git tag + release carrying the same
      # assets, so consumers (the cctui worker image) can pull
      # releases/download/latest/... and always get the newest build. Delete then
      # recreate so the tag moves to this commit.
      - name: publish rolling latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
          gh release create latest \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "latest (${TAG})" \
            --notes "Rolling pointer to the most recent release (${TAG})." \
            dist/scli-* dist/SHA256SUMS
